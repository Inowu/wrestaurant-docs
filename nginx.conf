server {
    # HTTP-level redirect so / never serves a meta-refresh stub (avoids client-side double-render)
    location = / {
        return 301 /bienvenido;
    }
    location = /api {
        return 301 /api/consultas;
    }

    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the raw OpenAPI spec at a stable URL the watchdog can fetch.
    location = /apis/openapi.json {
        add_header Content-Type application/json;
        try_files /apis/openapi.json =404;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
