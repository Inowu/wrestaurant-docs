name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip-check.outputs.should_skip }}
    steps:
      - id: skip-check
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" = "push" ] && printf '%s' "$HEAD_COMMIT_MESSAGE" | grep -q 'skip-deploy'; then
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: check-skip
    if: needs.check-skip.outputs.should_skip != 'true'
    uses: Inowu/inowu-shared-workflows/.github/workflows/deploy-dokploy-webhook.yml@main
    with:
      image_name: wrestaurant-docs
      app_type: compose
    secrets:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      DOKPLOY_APP_ID: ${{ secrets.DOKPLOY_APP_ID }}
